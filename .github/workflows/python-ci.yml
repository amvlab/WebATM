name: Python CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check .

      # Collects both suites: the core `webatm` package (tests/) and the
      # optional `webatm_integrated` package (WebATM-integrated/tests/, which is
      # import-light and needs no BlueSky install for collection). Run a marker
      # subset locally with `uv run pytest -m core` / `-m integrated`.
      - name: Run tests
        run: uv run pytest
