name: Publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Large/binary static assets (offline tiles, glyphs, navdata) are
      # gitignored and shipped via a separate "assets" GitHub release that
      # changes rarely (decoupled from the per-version code tarball). The
      # tag to pull is pinned in .assets-version at the repo root — bump that
      # file to roll Docker images onto a new asset bundle.
      - name: Hydrate static assets from pinned assets release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/assets
          ASSETS_TAG="$(tr -d '[:space:]' < .assets-version)"
          if [ -z "$ASSETS_TAG" ]; then
            echo "ERROR: .assets-version is empty or missing" >&2
            exit 1
          fi
          echo "Pulling static assets from release: $ASSETS_TAG"
          gh release download "$ASSETS_TAG" \
            --pattern 'webatm-assets-*.tar.gz' \
            --dir /tmp/assets
          tar -xzf /tmp/assets/webatm-assets-*.tar.gz \
            -C . \
            WebATM/static/tiles \
            WebATM/static/glyphs \
            WebATM/static/navdata
          ls -lh WebATM/static/tiles/ WebATM/static/glyphs/ WebATM/static/navdata/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
