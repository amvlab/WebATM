name: Publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Build two GHCR packages from the same tag:
    #   - standalone:  ghcr.io/<owner>/webatm            (Dockerfile)
    #   - integrated:  ghcr.io/<owner>/webatm-integrated (Dockerfile.integrated,
    #                  bundles BlueSky from amvlab/bluesky)
    # fail-fast is off so a transient failure on one variant doesn't cancel the
    # other mid-publish.
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standalone
            dockerfile: Dockerfile
            image: ${{ github.repository }}
          - variant: integrated
            dockerfile: Dockerfile.integrated
            image: ${{ github.repository }}-integrated

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Large/binary static assets (offline tiles, glyphs, navdata) are
      # gitignored and shipped via a separate "assets" GitHub release that
      # changes rarely (decoupled from the per-version code tarball). The
      # tag to pull is pinned in .assets-version at the repo root — bump that
      # file to roll Docker images onto a new asset bundle.
      - name: Hydrate static assets from pinned assets release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/assets
          ASSETS_TAG="$(tr -d '[:space:]' < .assets-version)"
          if [ -z "$ASSETS_TAG" ]; then
            echo "ERROR: .assets-version is empty or missing" >&2
            exit 1
          fi
          echo "Pulling static assets from release: $ASSETS_TAG"
          gh release download "$ASSETS_TAG" \
            --pattern 'webatm-assets-*.tar.gz' \
            --dir /tmp/assets
          tar -xzf /tmp/assets/webatm-assets-*.tar.gz \
            -C . \
            WebATM/static/tiles \
            WebATM/static/glyphs \
            WebATM/static/navdata
          ls -lh WebATM/static/tiles/ WebATM/static/glyphs/ WebATM/static/navdata/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the GHA cache per variant so the standalone and integrated
          # builds don't overwrite each other's layer cache.
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
