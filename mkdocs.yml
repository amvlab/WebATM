site_name: WebATM
site_description: >-
  A modern standalone web client for the BlueSky Air Traffic Management
  simulator, with MapLibre GL aircraft visualization.
site_url: https://amvlab.github.io/WebATM_core/
repo_url: https://github.com/amvlab/WebATM_core
repo_name: amvlab/WebATM_core
copyright: Copyright &copy; 2025 amvlab &mdash; AGPL-3.0

theme:
  name: material
  favicon: assets/favicon.png
  logo: assets/favicon.png
  palette:
    # Dark theme (default — matches the WebATM UI default)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # Light theme
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: getting-started.md
      - Configuration: configuration.md
      - Offline Use (PMTiles): offline-pmtiles.md
      - Integrated Build: integrated-build.md
      - Screenshot Gallery: gallery.md
  - Developer Guide:
      - Architecture: architecture.md
      - Development Workflow: development.md
  - Python API Reference:
      - Overview: api/index.md
      - Application (app, main): api/app.md
      - BlueSky Network Client: api/bluesky-client.md
      - Proxy Core: api/proxy.md
      - Proxy Managers: api/proxy-managers.md
      - Proxy Handlers: api/proxy-handlers.md
      - Server Package: api/server.md
      - Utilities & Logging: api/utils.md
      - Integrated Variant: api/integrated.md
  - Frontend (TypeScript):
      - Overview: frontend/index.md
      # API pages are generated by TypeDoc into docs/frontend/api/ and the
      # sidebar is inferred from that directory tree by mkdocs-literate-nav,
      # so new/renamed modules need no nav edits here.
      - API Reference: frontend/api/

# Pages that intentionally live outside the nav (e.g. the raw screenshots
# gallery README kept for GitHub browsing).
not_in_nav: |
  screenshots/README.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search
  - literate-nav
  - mkdocstrings:
      handlers:
        python:
          paths: [., WebATM-integrated]
          options:
            docstring_style: google
            docstring_options:
              returns_named_value: false
            docstring_section_style: table
            members_order: source
            merge_init_into_class: true
            show_root_heading: true
            show_source: true
            separate_signature: true
            show_signature_annotations: true
            filters: ["!^_"]
