# WebATM public demo stack (integrated image, gated + hardened, zero app changes).
#
#   Traefik v3 (TLS via Cloudflare DNS-01)
#     └── webatm  : 10 replicas of ghcr.io/amvlab/webatm-integrated, one sticky
#                   service. Returning users keep their `webatm-session` cookie
#                   and are never bounced off their container.
#     └── capacity-full : nginx serving the "all slots busy" page. Only shown to
#                   NEW visitors, and only while every replica is occupied.
#     └── controller : watches each replica's /status, flips the capacity page
#                   on/off, and wipes a replica after its visitor leaves. No app changes.
#
# SECURITY MODEL (see README "Security"): this is a DISPOSABLE SANDBOX PER
# VISITOR. The full app -- console, scenario/plugin uploads -- is intentionally
# open; in-container code execution is expected and contained:
#   * each `webatm` replica runs under the gVisor runtime (runsc) -- a real
#     user-space-kernel boundary, so syscalls never hit the host kernel;
#   * replicas sit on an INTERNAL, no-egress network (no exfiltration / C2);
#   * no host bind-mounts, all Linux capabilities dropped, no-new-privileges,
#     PID-limited, non-root;
#   * a replica is wiped (restarted) shortly after its visitor leaves, so the
#     next visitor gets a pristine sandbox.
# Requires gVisor installed on the host (see README). Set WEBATM_RUNTIME=runc
# to run without it (NOT a sandbox -- testing only).
#
# Quick start:
#   cp .env.example .env   # fill in Cloudflare token + your domain
#   docker compose up -d

services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE        # needed to bind :80 / :443
    networks:
      - edge                    # internet-facing: published ports + ACME egress
      - internal                # to reach the backends (which have no egress)
    ports:
      - "80:80"
      - "443:443"
      # - "8080:8080"   # dashboard (keep closed in production)
    environment:
      - TZ=${TZ:-Europe/Amsterdam}
      # Cloudflare DNS-01 challenge credentials (read by Traefik's ACME provider)
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      # ACME account e-mail for Let's Encrypt (kept out of the committed config)
      - TRAEFIK_CERTIFICATESRESOLVERS_PRODUCTION_ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic            # base.yml (static) + capacity.yml (controller)
      - ./traefik/certs:/var/traefik/certs:rw             # acme.json lives here

  webatm:
    image: ${WEBATM_IMAGE:-ghcr.io/amvlab/webatm-integrated:0.4.2}
    restart: unless-stopped
    # gVisor sandbox: every visitor's container runs under runsc so in-container
    # RCE (the console/uploads are open by design) cannot reach the host kernel.
    # Requires gVisor on the host + the runsc runtime registered in Docker.
    # Override with WEBATM_RUNTIME=runc to run un-sandboxed (testing only).
    runtime: ${WEBATM_RUNTIME:-runsc}
    # No egress: `internal` has no gateway, so a malicious scenario/plugin can't
    # phone home, exfiltrate, or attack third parties. Map tiles load in the
    # user's BROWSER (not here), and BlueSky runs on localhost, so the container
    # needs no outbound internet. (Verify the bundled BlueSky ships its nav data
    # and doesn't fetch it at runtime -- see README.)
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL                     # the app is non-root and needs no capabilities
    read_only: false            # see README for an optional read-only rootfs recipe
    # Disk-DoS guard: BlueSky's working dir (where uploads land -- scenario/,
    # plugins/ -- plus sim output/) is a SIZE-LIMITED tmpfs. No amount of
    # uploading can exhaust host disk (it's RAM-backed and capped), and writes
    # fail once the cap is hit. mode=1777 lets the non-root app user create its
    # subdirs without us hardcoding its uid. The size counts toward the memory
    # limit below, so we leave headroom there. (The app itself also rejects any
    # single upload over 10MB for plugins/settings, 50MB for scenarios.)
    tmpfs:
      - /home/webatm/bluesky:size=${BLUESKY_TMPFS_SIZE:-256m},mode=1777
    environment:
      - FLASK_ENV=production
      # Integrated image already sets WEBATM_INTEGRATED=1 and runs BlueSky
      # locally; nothing else is required for the app itself.
    sysctls:
      - net.ipv4.ip_local_port_range=32768 65535
      - net.core.somaxconn=1024
    healthcheck:
      # Docker-level liveness (Traefik does its own /health check too).
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"

      # --- main router: ALL traffic; in-session users (sticky cookie) always
      #     match here and reach their own container.
      - "traefik.http.routers.app.rule=Host(`${WEBATM_DOMAIN:-webatm.amvlab.eu}`)"
      - "traefik.http.routers.app.priority=50"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=production"
      - "traefik.http.routers.app.tls.domains[0].main=${CERT_DOMAIN:-amvlab.eu}"
      - "traefik.http.routers.app.tls.domains[0].sans=${CERT_WILDCARD:-*.amvlab.eu}"
      - "traefik.http.routers.app.service=webatm"
      - "traefik.http.routers.app.middlewares=ratelimit@file"

      # --- service: one logical service, all 10 replicas as servers, pinned
      #     per-browser with a sticky cookie. passHostHeader keeps Socket.IO /
      #     WebSocket upgrades working through the proxy.
      - "traefik.http.services.webatm.loadbalancer.server.port=8082"
      - "traefik.http.services.webatm.loadbalancer.passhostheader=true"
      - "traefik.http.services.webatm.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.webatm.loadbalancer.sticky.cookie.name=webatm-session"
      - "traefik.http.services.webatm.loadbalancer.sticky.cookie.secure=true"
      - "traefik.http.services.webatm.loadbalancer.sticky.cookie.httponly=true"
      - "traefik.http.services.webatm.loadbalancer.sticky.cookie.samesite=strict"

      # --- liveness health check (NOT occupancy): /health returns 200 whenever
      #     Flask is up, so Traefik simply avoids a replica that is still
      #     (re)starting. This is safe and never bounces an active user.
      - "traefik.http.services.webatm.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.webatm.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.webatm.loadbalancer.healthcheck.timeout=5s"
    deploy:
      replicas: 10
      resources:
        limits:
          cpus: "0.75"
          memory: 1280M         # ~1GB app + up to 256M upload tmpfs (counts here)
          pids: 512             # stop fork bombs (server + node children + threads)
      restart_policy:
        condition: any
        delay: 2s

  capacity-full:
    image: nginx:alpine
    container_name: capacity-full
    restart: unless-stopped
    networks:
      - internal        # reachable by Traefik as http://capacity-full:80 (see traefik/dynamic/base.yml)
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./capacity_full/capacity-full.html:/usr/share/nginx/html/index.html:ro
    # No Traefik labels: the capacity-full service + (conditional) router are
    # defined in the file provider so the controller can switch it in and out.

  controller:
    image: python:3.13-slim
    container_name: webatm-controller
    restart: unless-stopped
    networks:
      - internal        # must share the network to reach replica IPs on :8082
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL             # talks to the docker socket (as root) + the net; no caps needed
    command: ["python", "/app/controller.py"]
    environment:
      - WEBATM_SERVICE=webatm
      - PROXY_NETWORK=internal
      - WEBATM_DOMAIN=${WEBATM_DOMAIN:-webatm.amvlab.eu}
      - STICKY_COOKIE_NAME=webatm-session
      - CERT_RESOLVER=production
      - POLL_INTERVAL=${POLL_INTERVAL:-5}
      - RECYCLE_ENABLED=${RECYCLE_ENABLED:-1}
      - RECYCLE_IDLE_GRACE=${RECYCLE_IDLE_GRACE:-120}    # wipe a used replica this long after the visitor leaves
      - MAX_SESSION_TIME=${MAX_SESSION_TIME:-1200}       # hard per-session cap, 20 min (0 = none)
      - DYNAMIC_DIR=/dynamic
      - CSV_FILE=${CSV_FILE:-/log/webatm-sessions.csv}   # session history (set empty to disable)
      - CSV_INTERVAL=${CSV_INTERVAL:-60}                 # seconds between CSV rows
      - CSV_MAX_ROWS=${CSV_MAX_ROWS:-100000}             # retention cap; oldest rows trimmed
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock     # rw: needs to restart idle replicas
      - ./controller:/app:ro
      - ./traefik/dynamic:/dynamic                     # writes capacity.yml here (Traefik watches it)
      - webatm-logs:/log                               # named volume: session history persists across down/up
    depends_on:
      - traefik

networks:
  # Internet-facing network for Traefik only (published ports + ACME egress).
  edge:
    name: webatm-edge
  # No-egress network for the backends. `internal: true` removes the gateway,
  # so containers here cannot reach the internet (only each other + Traefik).
  internal:
    name: webatm-internal
    internal: true

volumes:
  webatm-logs:
    name: webatm-logs
